<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Notion-Embed freundlich */
  html, body {
    width: 100%;
    overflow: hidden;          /* verhindert abgeschnittene "Scroll-Ränder" im Embed */
    height: fit-content;
  }

  body {
    background: #1e1e2e;
    color: #cdd6f4;
    font-family: 'Segoe UI', sans-serif;

    /* vorher: display:flex + center + min-height:100vh */
    display: block;
    padding: 8px;
  }

  .app {
    width: min(100%, 440px);
    margin: 0 auto;            /* horizontal zentriert ohne Fullscreen-Flex */
  }

  /* Tabs */
  .tab-frame { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .tab-btn {
    background: #1e1e2e;
    color: #cdd6f4;
    border: none;
    border-radius: 4px;
    padding: 6px 12px;
    font-size: 11pt;
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
  }
  .tab-btn.active { background: #313244; color: #89b4fa; }

  /* Display */
  .display {
    background: #313244;
    border-radius: 6px;
    padding: clamp(12px, 4vw, 20px) clamp(12px, 5vw, 30px);
    text-align: center;
    margin-bottom: 10px;
  }
  #time-label {
    font-family: 'Courier New', monospace;
    font-size: clamp(36px, 14vw, 64px);
    font-weight: bold;
    color: #89b4fa;
    line-height: 1;
  }
  #status-label {
    font-size: 11pt;
    color: #f9e2af;
    min-height: 26px;
    margin-top: 8px;
  }

  /* Input */
  #input-frame { margin-bottom: 10px; }
  #input-frame label { display: block; font-size: 10pt; margin-bottom: 4px; }
  #duration-input {
    width: 100%;
    background: #313244;
    color: #cdd6f4;
    border: none;
    padding: 8px;
    font-family: 'Courier New', monospace;
    font-size: clamp(14px, 3.6vw, 16px);
    border-radius: 4px;
    outline: none;
  }

  /* Buttons */
  .btn-frame { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    font-size: 11pt;
    font-weight: bold;
    font-family: 'Segoe UI', sans-serif;
    cursor: pointer;
    color: #1e1e2e;
    flex: 1 1 120px;
  }
  .btn:disabled { opacity: 0.4; cursor: default; }
  #start-btn { background: #a6e3a1; }
  #pause-btn { background: #f9e2af; }
  #reset-btn { background: #f38ba8; }

  @media (max-width: 360px) {
    body { padding: 6px; }
    .btn { flex-basis: 100%; }
  }
</style>
